services:
  postgres:
    image: postgres:16-alpine
    container_name: buoy_coordinator_postgres
    environment:
      POSTGRES_DB: buoy_coordinator
      POSTGRES_USER: buoy
      POSTGRES_PASSWORD: buoy_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buoy -d buoy_coordinator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
